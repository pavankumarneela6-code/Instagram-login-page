 <!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram-login</title>
    </head>
    <style>
        body{
            
            background-image: url("insta-background.jpeg");
            background-size: cover;
        }
        .box{
            width:350px;
            height:550px;
            margin:auto;
            margin-top:70px;
            border:1px solid white;
            background-color: white;
            padding: 20px;
            position: relative;
        }
        .main{
            text-align: center;
        }
        .main h1{
            font-family: 'Montserrat', sans-serif;
            font-size: 32px;
            text-align: center;
        }
        input{
            width:350px;
            height:50px;
        }
        .main1 button{
            width:350;
            height:50;
            border-radius:10px;
            background-color:rgb(44, 141, 216);
            color:white;
        }
        .or-line{
            display: flex;
            align-items: center;
            width: 300px;
            margin: 20px auto;
        }

        .or-line::before{
            content: "";
            flex: 1;
            border-bottom: 1px solid #000000;
        }
        .or-line::after{
            content: "";
            flex: 1;
            border-bottom: 1px solid #000000;
        }

        .or-line h1{
            padding: 10px;
            color: #000000;
            font-size: 13px;
           
        }
        .logo{
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .logo img{
            width:33px;
            height:33px;
            margin-left: 0px;
           
        }
        .logo span{
            font-family: Arial, Helvetica, sans-serif;
            font-size:20px;
            color:rgb(48, 48, 214);
            text-align: center;
            align-items: center;
           
        }
        p{
            text-align: center;
        }
        .box2{
            width:390px;
            height:50px;
            margin:auto;
            border:1px solid white;
            background-color: white;
            position: absolute;
            left:0px;
           
            
        }
        a{
            text-decoration: none;
        }
       .footer{
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: black;
            color: white;
            text-align: center;
        }
    </style>
    <body>
        <div class="box">
            <div class="main">
                <div class="insta-logo">
                <img src="https://img.icons8.com/?size=100&id=YtpeVQhQ8USm&format=png&color=000000">
                <h1>Instagram</h1>
            </div><br><br>
            <input type="text" placeholder="phone number,username,or email" required><br><br>
            <input type="password" placeholder="passwors"><br><br>
            <a class="main1" href="login.html">
                <button> Login</button>
            </a>
            <div class="or-line">
                <h1>OR</h1>
            </div>
        </div>
        <div class="logo">
                <img src="https://img.icons8.com/?size=100&id=13912&format=png&color=000000" alt="facebook-logo">
                <a href="facebook.html"><span>Login With Facebook</span></a>             
        </div>
        <a href="Forgot-password.html"><p>Forgot Password?</p></a><br>
        <div class="box2">
            <p>Don't have an account? <a href="Sign-Up.html">Sign Up</a> </p>
        </div>
        </div>
        <div class="footer">
            <h2 style="color:white margin-butom: 0px;">&copy;<b>PAVAN</b></h2>
        </div>    
    </body>
</html>
