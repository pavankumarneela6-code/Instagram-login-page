<html>
    <head>
        <title>Forgot-password</title>
    </head>
    <style>
        body{
            background-image: url("insta-background.jpeg");
            background-size: cover;
        }
        p{ 
            color:white;
        }
        h2{
            color:white;
        }
        #P{
            color:blue
        }
        .box{
            width:400px;
            height:600px;
            margin:auto;
            padding-top: 50px;;
            background-color: rgb(14, 15, 63);
        }
        .or-line{
            display: flex;
            align-items: center;
            width: 300px;
            margin: 20px auto;
        }

        .or-line::before{
            content: "";
            flex: 1;
            border-bottom: 1px solid #ffffff;
        }
        .or-line::after{
            content: "";
            flex: 1;
            border-bottom: 1px solid #ffffff;
        }

        .or-line h1{
            padding: 10px;
            color: #ffffff;
            font-size: 13px;
        }
        input{
            border:1px solid white;
            background-color: rgb(14, 15, 63);
            margin-left:10px;
            width:380px;
            height: 10%;
            border-radius:10px;
        }   
        .main1 button{
            width:380px;
            height:50px;
            margin-left:10px;
            border-radius:10px;
            background-color:rgb(44, 141, 216);
            color:white;
        }
        #o{
            text-align: center;
        }
        .logo{
            display:flex;
            align-items: center;
            justify-content: center;
            gap:10px;
            width:340px;
            margin-left:30px;
            background-color:rgb(255, 255, 255);
            color:rgb(0, 0, 0);
        }
        .logo img{
            width:30px;
            height:30px;
            border-radius:10px;
            background-color:rgb(255, 255, 255);
            color:rgb(0, 0, 0);
        }    
        a{
               text-decoration: none;
        }
       
    </style>
    <body>
    <div class="box">
        <h2>Find your account</h2>
        <p>Enter your mobile number.</p>
        <p id="P">can't reset your password</p>
        <input type="text" placeholder="Moble number"><br><br>
        <a class="main1" href="login.html">
                <button> Login</button>
        </a>
        <a><p id="o">Find by email or username instead</p></a>
        <div class="or-line">
            <h1>OR</h1>
        </div>
         <div class="logo" >
                <img src="https://img.icons8.com/?size=100&id=13912&format=png&color=000000" alt="facebook-logo">
                <a href="facebook.html"><span>Login With Facebook</span></a>       
        </div>
    </div>    
    </body>
</html>
